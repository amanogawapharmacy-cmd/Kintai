<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>株式会社リバーフィールズ｜出退勤</title>
<style>
  :root{
    --paper:#f6f5f1; --card:#ffffff; --line:#e6e3db; --line-soft:#efece5;
    --ink:#1b2430; --ink-soft:#5b6674; --accent:#0e7a6b;
    --go:#1f9d63; --go-bg:#e6f4ec; --stop:#e0603a; --stop-bg:#f7ece7;
    --rest:#d9a021; --rest-bg:#fbf3df; --leave:#3a6ea5; --leave-bg:#e7eef6;
    --resume:#0e7a6b; --night:#6d5bb5; --holiday:#b5476d; --holiday-bg:#fbeef3;
    --shadow:0 1px 2px rgba(27,36,48,.05), 0 10px 30px rgba(27,36,48,.07);
  }
  *{box-sizing:border-box;-webkit-tap-highlight-color:transparent;margin:0;padding:0}
  html,body{width:100%;height:100%;overflow:hidden}
  body{background:var(--paper);color:var(--ink);font-family:"Hiragino Kaku Gothic ProN","Yu Gothic",system-ui,sans-serif;display:flex;flex-direction:column;-webkit-text-size-adjust:100%;user-select:none}
  header{display:flex;align-items:center;justify-content:space-between;padding:14px 30px;flex-shrink:0}
  .company{font-size:1.05rem;font-weight:800;letter-spacing:.06em}
  .header-mini{font-size:1.1rem;font-weight:700;color:var(--ink-soft);font-variant-numeric:tabular-nums}
  main{flex:1;display:flex;flex-direction:column;padding:2px 26px 18px;gap:18px;min-height:0;overflow:hidden}

  #screen-list{display:flex;flex-direction:column;gap:18px;height:100%}
  .hero{position:relative;overflow:hidden;border-radius:26px;height:236px;border:1px solid var(--line);box-shadow:var(--shadow);display:flex;align-items:center;justify-content:center;flex-shrink:0}
  .sky-layer{position:absolute;inset:0;transition:background 2s ease}
  .celestial{position:absolute;width:76px;height:76px;border-radius:50%;transition:left 2s ease,top 2s ease,opacity 2s ease,background 2s ease,box-shadow 2s ease;transform:translate(-50%,-50%)}
  .starfield{position:absolute;inset:0;transition:opacity 2s ease;pointer-events:none}
  .star{position:absolute;background:#fff;border-radius:50%;animation:tw 3s ease-in-out infinite}
  @keyframes tw{0%,100%{opacity:.35}50%{opacity:1}}
  .hill{position:absolute;left:0;right:0;bottom:0;width:100%;height:72px}
  .hero-content{position:relative;z-index:3;text-align:center}
  .hero-date{font-size:1.2rem;font-weight:800;letter-spacing:.05em}
  .hero-holiday-name{font-weight:800}
  .hero-time{font-size:6.2rem;font-weight:800;line-height:1;letter-spacing:.02em;font-variant-numeric:tabular-nums;margin-top:4px}
  .hero-time .sec{font-size:2.7rem;font-weight:700;margin-left:6px;opacity:.75}

  .section-label{font-size:.74rem;font-weight:800;letter-spacing:.12em;color:var(--ink-soft);text-transform:uppercase;padding:0 4px;flex-shrink:0}
  .name-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(215px,1fr));gap:15px;flex:1;align-content:start;overflow-y:auto;padding:2px}
  .name-card{background:var(--card);border:2px solid var(--line);border-radius:20px;padding:20px;cursor:pointer;transition:transform .1s,box-shadow .1s;display:flex;flex-direction:column;gap:6px;box-shadow:var(--shadow)}
  .name-card:active{transform:scale(.96);box-shadow:none}
  .name-card .emp-name{font-size:1.4rem;font-weight:800}
  .name-card .emp-status{font-size:.78rem;font-weight:700;display:flex;align-items:center;gap:6px}
  .name-card .dot{width:8px;height:8px;border-radius:50%}
  .name-card.st-working{border-color:var(--go);background:var(--go-bg)}
  .name-card.st-rest{border-color:var(--rest);background:var(--rest-bg)}
  .name-card.st-done{border-color:var(--line);opacity:.62}
  .name-card.st-leave{border-color:var(--leave);background:var(--leave-bg)}
  .name-card.st-holiday{border-color:var(--holiday);background:var(--holiday-bg)}
  .card-meta{font-size:.74rem;color:var(--ink-soft);margin-top:2px}

  #screen-punch{display:none;flex-direction:column;gap:14px;height:100%;overflow-y:auto;padding-bottom:8px}
  .back-btn{border:1.5px solid var(--line);background:var(--card);color:var(--ink-soft);border-radius:12px;padding:11px 22px;font-size:.92rem;font-weight:700;cursor:pointer;align-self:flex-start;flex-shrink:0;box-shadow:var(--shadow)}
  .back-btn:active{background:var(--line-soft)}
  .punch-hero{background:var(--card);border:1px solid var(--line);border-radius:22px;padding:24px 30px;display:flex;align-items:center;gap:22px;flex-shrink:0;box-shadow:var(--shadow)}
  .punch-avatar{width:72px;height:72px;border-radius:50%;display:flex;align-items:center;justify-content:center;font-size:2rem;font-weight:800;flex-shrink:0;color:#fff}
  .punch-name{font-size:2rem;font-weight:800;line-height:1.1}
  .punch-sub{font-size:.88rem;color:var(--ink-soft);margin-top:4px}
  .punch-badge{display:inline-flex;align-items:center;gap:7px;padding:6px 15px;border-radius:999px;font-size:.85rem;font-weight:700;border:1.5px solid;margin-top:9px}
  .punch-rule-box{background:var(--card);border:1px solid var(--line);border-radius:16px;padding:13px 20px;flex-shrink:0;display:flex;gap:20px;flex-wrap:wrap;align-items:center;font-size:.85rem;color:var(--ink-soft);box-shadow:var(--shadow)}
  .punch-rule-box strong{color:var(--ink);font-weight:800}
  .sess-line{width:100%;display:flex;gap:14px;flex-wrap:wrap;padding-top:4px;border-top:1px dashed var(--line);margin-top:2px}
  .sess-chip{font-size:.8rem;color:var(--ink);background:var(--paper);border-radius:8px;padding:4px 10px;font-variant-numeric:tabular-nums}
  .punch-btns{display:grid;grid-template-columns:1fr 1fr;gap:12px;flex:1;align-content:start;min-height:0}
  .punch-btn{border:none;border-radius:18px;padding:0 12px;min-height:88px;font-size:1.25rem;font-weight:800;color:#fff;cursor:pointer;letter-spacing:.02em;display:flex;flex-direction:column;align-items:center;justify-content:center;gap:3px;transition:transform .08s;box-shadow:0 4px 0 rgba(0,0,0,.13);white-space:nowrap}
  .punch-btn small{font-size:.7rem;font-weight:600;opacity:.85}
  .punch-btn:active{transform:translateY(4px);box-shadow:none}
  .punch-btn:disabled{opacity:.25;cursor:default;filter:grayscale(.5);box-shadow:none}
  .punch-btn.go{background:var(--go)} .punch-btn.stop{background:var(--stop)} .punch-btn.rest{background:var(--rest)}
  .punch-btn.resume{background:var(--resume)}
  .punch-btn.leave{background:var(--leave);grid-column:1/-1;min-height:60px}
  .punch-btn.holiday{background:var(--holiday);grid-column:1/-1;min-height:60px}

  #screen-confirm{display:none;flex-direction:column;align-items:center;justify-content:center;gap:18px;height:100%}
  .confirm-icon{width:104px;height:104px;border-radius:50%;display:flex;align-items:center;justify-content:center;font-size:3rem}
  .confirm-msg{font-size:1.6rem;font-weight:800;text-align:center}
  .confirm-time{font-size:3rem;font-weight:800;font-variant-numeric:tabular-nums;color:var(--accent)}
  .confirm-sub{font-size:1rem;color:var(--ink-soft)}
  .confirm-ot{font-size:.9rem;font-weight:800;padding:7px 18px;border-radius:999px;background:var(--stop-bg);color:var(--stop)}

  footer{padding:6px 30px 14px;display:flex;justify-content:flex-end;gap:10px;flex-shrink:0}
  .footer-btn{border:1.5px solid var(--line);background:var(--card);border-radius:10px;padding:8px 14px;color:var(--ink-soft);font-size:.8rem;font-weight:700;cursor:pointer;box-shadow:var(--shadow)}
  .footer-btn:active{background:var(--line-soft)}

  .modal-bg{position:fixed;inset:0;background:rgba(27,36,48,.35);display:none;align-items:center;justify-content:center;z-index:100;padding:20px}
  .modal-bg.open{display:flex}
  .modal{background:var(--card);border:1px solid var(--line);border-radius:22px;padding:26px;width:100%;max-width:560px;max-height:86vh;overflow-y:auto;box-shadow:0 20px 60px rgba(0,0,0,.2)}
  .modal h2{font-size:1.1rem;margin-bottom:4px}
  .modal p{font-size:.83rem;color:var(--ink-soft);margin-bottom:16px}
  .modal-actions{display:flex;gap:8px;margin-top:12px}
  .modal-actions button{flex:1;border:none;border-radius:10px;padding:13px;font-size:.95rem;font-weight:700;cursor:pointer}
  .modal-actions .cancel{background:var(--line-soft);color:var(--ink)} .modal-actions .ok{background:var(--accent);color:#fff}
  .report-table{width:100%;border-collapse:collapse;font-size:.83rem;font-variant-numeric:tabular-nums}
  .report-table th{padding:8px 10px;color:var(--ink-soft);font-size:.72rem;font-weight:700;border-bottom:2px solid var(--line)}
  .report-table td{padding:10px;border-bottom:1px solid var(--line-soft);text-align:center}
  .report-table td:first-child,.report-table th:first-child{text-align:left;font-weight:800}
  .manage-bar{display:flex;gap:8px;margin-bottom:12px}
  .manage-bar input{flex:1;border:1.5px solid var(--line);border-radius:10px;padding:10px 14px;font-size:1rem}
  .manage-bar button{background:var(--accent);color:#fff;border:none;border-radius:10px;padding:10px 16px;font-weight:700;cursor:pointer}
  .manage-row{display:flex;align-items:center;gap:10px;background:var(--paper);border-radius:12px;padding:12px 16px;margin-bottom:8px}
  .manage-row .en{flex:1;font-weight:700}
  .manage-row button{border:1.5px solid var(--line);background:#fff;border-radius:8px;padding:5px 10px;color:var(--stop);font-size:.82rem;cursor:pointer}
  .cal-grid{display:grid;grid-template-columns:repeat(7,1fr);gap:4px}
  .cal-head{font-size:.7rem;font-weight:800;text-align:center;padding:3px 0}
  .cal-cell{min-height:76px;border:1px solid var(--line-soft);border-radius:8px;padding:4px;background:var(--card);display:flex;flex-direction:column;gap:2px;overflow:hidden}
  .cal-cell.empty{background:transparent;border:none}
  .cal-cell.off{background:#faf5f2}
  .cal-cell.today{border:2px solid var(--accent)}
  .cal-d{font-size:.82rem;font-weight:800;font-variant-numeric:tabular-nums}
  .cal-hol{font-size:.58rem;color:var(--holiday);line-height:1.1;font-weight:700}
  .cal-chips{display:flex;flex-direction:column;gap:2px;margin-top:auto}
  .cal-chip{font-size:.62rem;font-weight:700;border-radius:5px;padding:1px 4px;display:flex;justify-content:space-between;gap:3px;align-items:center}
  .cal-chip span{overflow:hidden;text-overflow:ellipsis;white-space:nowrap}
  .cal-chip b{font-weight:800;opacity:.8;flex-shrink:0}
  .cal-chip.leave{background:var(--leave-bg);color:var(--leave)}
  .cal-chip.half{background:#eef3fb;color:#2f6fd0}
  .cal-chip.holiday{background:var(--holiday-bg);color:var(--holiday)}
  .ts-btn{border:1.5px solid var(--line);background:#fff;border-radius:6px;padding:4px 8px;cursor:pointer}
  #sheet{background:#fff;color:#000;font-size:11px}
  #sheet .sh-head{display:flex;justify-content:space-between;align-items:flex-end;margin-bottom:10px;border-bottom:2px solid #333;padding-bottom:6px}
  #sheet h3{font-size:17px;margin:2px 0 0}
  #sheet table.ts{width:100%;border-collapse:collapse;font-variant-numeric:tabular-nums}
  #sheet table.ts th,#sheet table.ts td{border:1px solid #9a9a9a;padding:2px 4px;text-align:center;font-size:10.5px;line-height:1.35}
  #sheet table.ts th{background:#ececec;font-weight:700}
  #sheet td.memo{text-align:left;font-size:9px}
  #sheet .hol{color:#c0392b;margin-left:3px}
  #sheet .sh-sum{display:flex;flex-wrap:wrap;gap:8px 12px;margin-top:12px}
  #sheet .sh-sum div{border:1px solid #9a9a9a;border-radius:4px;padding:5px 12px;font-size:11px}
  #sheet .sh-sum b{font-weight:800;font-size:12px;margin-left:3px}
  #sheet .sh-sign{display:flex;gap:14px;margin-top:14px;justify-content:flex-end}
  #sheet .sh-sign .box{border:1px solid #9a9a9a;width:76px;height:50px;font-size:9px;text-align:center;padding-top:2px}
  #sheet .sheet-page + .sheet-page{margin-top:22px;border-top:2px dashed #bbb;padding-top:22px}
  @media print{
    body *{visibility:hidden!important}
    #modalBg{position:static!important;display:block!important;background:none!important;padding:0!important}
    #modal{position:static!important;max-width:none!important;max-height:none!important;overflow:visible!important;box-shadow:none!important;border:none!important;padding:0!important;border-radius:0!important}
    #sheet,#sheet *{visibility:visible!important}
    #sheet{position:absolute;left:0;top:0;width:100%}
    #sheet .sheet-page + .sheet-page{margin-top:0;border-top:none;padding-top:0;page-break-before:always}
    .no-print{display:none!important}
    @page{size:A4 portrait;margin:10mm}
  }
</style>
</head>
<body>
<header>
  <div class="company">株式会社リバーフィールズ</div>
  <button class="footer-btn" id="btnSettings" style="font-size:1.15rem;padding:8px 13px" aria-label="設定">⚙</button>
</header>

<main>
  <div id="screen-list">
    <div class="hero" id="hero">
      <div class="sky-layer" id="skyLayer"></div>
      <div class="starfield" id="starfield"></div>
      <div class="celestial" id="celestial"></div>
      <svg class="hill" id="hill" viewBox="0 0 400 72" preserveAspectRatio="none">
        <path d="M0,72 L0,44 Q70,20 150,38 T290,32 Q350,26 400,40 L400,72 Z" fill="rgba(20,30,45,.16)"/>
        <path d="M0,72 L0,54 Q90,36 190,50 T400,48 L400,72 Z" fill="rgba(20,30,45,.22)"/>
      </svg>
      <div class="hero-content">
        <div class="hero-date" id="heroDate">—</div>
        <div class="hero-time" id="heroTime">--:--<span class="sec">--</span></div>
      </div>
    </div>
    <div id="missAlert" style="display:none;margin-bottom:10px"></div>
    <div id="fiveAlert" style="display:none"></div>
    <div id="backupAlert" style="display:none;margin-top:10px"></div>
    <div class="section-label">名前をタップして打刻</div>
    <div class="name-grid" id="nameGrid"></div>
  </div>

  <div id="screen-punch">
    <button class="back-btn" id="backBtn">← 戻る</button>
    <div class="punch-hero">
      <div class="punch-avatar" id="pAvatar"></div>
      <div style="flex:1">
        <div class="punch-name" id="pName"></div>
        <div class="punch-sub" id="pSub"></div>
        <div class="punch-badge" id="pBadge"><span class="dot" id="pDot"></span><span id="pBadgeTxt"></span></div>
      </div>
    </div>
    <div class="punch-rule-box" id="ruleBox"></div>
    <div class="punch-btns" id="punchBtns"></div>
  </div>

  <div id="screen-confirm">
    <div class="confirm-icon" id="cfIcon"></div>
    <div class="confirm-msg" id="cfMsg"></div>
    <div class="confirm-time" id="cfTime"></div>
    <div class="confirm-sub" id="cfSub"></div>
    <div class="confirm-ot" id="cfOt" style="display:none"></div>
  </div>
</main>

<footer>
  <button class="footer-btn" id="btnCal">📅 カレンダー</button>
  <button class="footer-btn" id="btnEdit">✎ 修正・有給入力</button>
  <button class="footer-btn" id="btnManage">👥 従業員管理</button>
  <button class="footer-btn" id="btnReport">📊 集計</button>
</footer>

<div class="modal-bg" id="modalBg"><div class="modal" id="modal"></div></div>

<script>
/* ═══ STORAGE ═══ */
const S={hasWin:typeof window!=='undefined'&&!!window.storage,mem:{},
  async get(k){if(this.hasWin){try{const r=await window.storage.get(k);return r?r.value:null}catch{return null}}return this.mem[k]??null},
  async set(k,v){if(this.hasWin){try{await window.storage.set(k,v);return}catch{}}this.mem[k]=v}};

/* ═══ HELPERS ═══ */
const pad=n=>String(n).padStart(2,'0');
const dkey=d=>`${d.getFullYear()}-${pad(d.getMonth()+1)}-${pad(d.getDate())}`;
const today=()=>dkey(new Date());
const hm=ts=>{const d=new Date(ts);return `${pad(d.getHours())}:${pad(d.getMinutes())}`;};
const fmtDur=m=>{m=Math.max(0,Math.round(m));return `${Math.floor(m/60)}:${pad(m%60)}`;};
const WD=['日','月','火','水','木','金','土'];
const COLORS=['#0e7a6b','#3a6ea5','#9d1f7a','#1f639d','#6b3a0e','#2f6fd0'];

/* ═══ 祝日（毎年自動計算・年替わりで自動更新） ═══ */
function nthMonday(y,m,n){const f=new Date(y,m-1,1).getDay();return 1+((1-f+7)%7)+(n-1)*7;}
function vernal(y){return Math.floor(20.8431+0.242194*(y-1980)-Math.floor((y-1980)/4));}
function autumnal(y){return Math.floor(23.2488+0.242194*(y-1980)-Math.floor((y-1980)/4));}
function computeHolidays(year){
  const H={},add=(m,d,name)=>{H[`${year}-${pad(m)}-${pad(d)}`]=name;};
  add(1,1,'元日');add(1,nthMonday(year,1,2),'成人の日');add(2,11,'建国記念の日');add(2,23,'天皇誕生日');
  add(3,vernal(year),'春分の日');add(4,29,'昭和の日');add(5,3,'憲法記念日');add(5,4,'みどりの日');add(5,5,'こどもの日');
  add(7,nthMonday(year,7,3),'海の日');add(8,11,'山の日');add(9,nthMonday(year,9,3),'敬老の日');add(9,autumnal(year),'秋分の日');
  add(10,nthMonday(year,10,2),'スポーツの日');add(11,3,'文化の日');add(11,23,'勤労感謝の日');
  const base={...H};
  for(let m=1;m<=12;m++){const dim=new Date(year,m,0).getDate();for(let d=1;d<=dim;d++){const key=`${year}-${pad(m)}-${pad(d)}`;if(base[key])continue;const dt=new Date(year,m-1,d);if(dt.getDay()===0)continue;const pk=dkey(new Date(year,m-1,d-1)),nk=dkey(new Date(year,m-1,d+1));if(base[pk]&&base[nk])H[key]='国民の休日';}}
  for(const key of Object.keys({...H}).sort()){const [yy,mm,dd]=key.split('-').map(Number);const dt=new Date(yy,mm-1,dd);if(dt.getDay()===0){let n=new Date(dt);do{n.setDate(n.getDate()+1);}while(H[dkey(n)]);H[dkey(n)]='振替休日';}}
  return H;
}
const _holCache={};
function getHolidays(y){if(!_holCache[y])_holCache[y]=computeHolidays(y);return _holCache[y];}
function holidayName(dt){return getHolidays(dt.getFullYear())[dkey(dt)]||null;}

/* ═══ 就業ルール ═══ */
const OFF_DAYS=[0,4];
function ruleFor(dt){
  const dow=dt.getDay(),hol=holidayName(dt);
  if(OFF_DAYS.includes(dow)||hol) return {type:'off',otStart:9*60,startMin:null,endMin:null,label:hol?`祝日（${hol}）`:'所定休日（日・木）',holidayName:hol||null};
  if(dow===6) return {type:'sat',otStart:13*60,startMin:9*60,endMin:12*60+30,label:'9:00〜12:30 / 13:00から残業',holidayName:null};
  return {type:'week',otStart:18*60+30,startMin:9*60,endMin:18*60,label:'9:00〜18:00 / 18:30から残業',holidayName:null};
}
function lateEarly(day,dt){
  const rule=ruleFor(dt);
  if(!day||day.leave>0||day.holiday||rule.startMin==null) return {late:0,early:0};
  const fi=firstIn(day),lo=lastOut(day); let late=0,early=0;
  if(fi){ const t=new Date(fi); late=Math.max(0,(t.getHours()*60+t.getMinutes())-rule.startMin); }
  if(lo){ const t=new Date(lo); early=Math.max(0,rule.endMin-(t.getHours()*60+t.getMinutes())); }
  return {late,early};
}
function dateColor(dt,dark){
  const dow=dt.getDay(),hol=holidayName(dt);
  if(dow===0||hol) return dark?'#ff9d9d':'#d23b3b';
  if(dow===6) return dark?'#9dc4ff':'#2f6fd0';
  return dark?'rgba(255,255,255,.9)':'#3a4250';
}

/* ═══ 勤怠モデル（複数セッション対応） ═══
   day = { sessions:[{in,out}], breaks:[{start,end}], leave:0|1, holiday:bool }
*/
function emptyDay(){return {sessions:[],breaks:[],leave:0,holiday:false};}
function normDay(day){
  if(!day) return emptyDay();
  if(day.sessions) return {sessions:day.sessions,breaks:day.breaks||[],leave:day.leave||0,holiday:!!day.holiday};
  const s=[]; if(day.in) s.push({in:day.in,out:day.out||null});  // 旧形式を移行
  return {sessions:s,breaks:day.breaks||[],leave:day.leave||0,holiday:!!day.holiday};
}
function openSession(day){ const ss=day.sessions||[]; const last=ss[ss.length-1]; return (last&&last.out===null)?last:null; }
function firstIn(day){ const s=(day.sessions||[]).filter(x=>x.in); return s.length?Math.min(...s.map(x=>x.in)):null; }
function lastOut(day){ const s=(day.sessions||[]).filter(x=>x.out); return s.length?Math.max(...s.map(x=>x.out)):null; }

function intervals(day){
  let iv=[];
  for(const s of (day.sessions||[])){ if(!s.in) continue; iv.push([s.in, s.out||Date.now()]); }
  for(const b of (day.breaks||[])){
    const be=b.end||Date.now(); const nx=[];
    for(const [s,e] of iv){ if(be<=s||b.start>=e){nx.push([s,e]);continue;} if(b.start>s)nx.push([s,b.start]); if(be<e)nx.push([be,e]); }
    iv=nx;
  }
  return iv.filter(([s,e])=>e>s);
}
function workedMin(day){ if(!day||day.leave===1)return 0; return Math.round(intervals(day).reduce((a,[s,e])=>a+(e-s),0)/60000); }
function breakMin(day){ let b=0; for(const x of (day.breaks||[])){ const be=x.end||Date.now(); b+=Math.max(0,Math.round((be-x.start)/60000)); } return b; }
function nightMin(day){ if(!day||day.leave===1)return 0; let n=0; for(const [s,e] of intervals(day)){for(let t=s;t<e;t+=60000){const h=new Date(t).getHours();if(h>=22||h<5)n++;}} return n; }
/* 残業＝実働のうち、時刻がotStart(=定時+30分)以降にあたる分。中抜けや呼び出しの空き時間は含めない */
function overtimeMin(day,rule){
  if(!day||day.leave===1)return 0;
  const fi=firstIn(day); if(fi===null)return 0;
  const d0=new Date(fi); d0.setHours(0,0,0,0);
  const otAbs=d0.getTime()+rule.otStart*60000;  // その日の定時+30分の絶対時刻（日跨ぎも正しく判定）
  let ot=0;
  for(const [s,e] of intervals(day)){ const os=Math.max(s,otAbs); if(e>os) ot+=(e-os); }
  ot=Math.round(ot/60000);
  return Math.floor(ot/30)*30;   // 定時+30分以降は30分単位で切り捨て（37分→30, 59分→30, 60分→60）
}
function statusOf(day){
  if(!day) return 'none';
  if(day.leave===1) return 'leave';
  const ss=day.sessions||[];
  if(!ss.length) return 'none';
  if(openSession(day)) return (day.breaks||[]).some(b=>!b.end)?'rest':'working';
  return 'done';
}

/* ── 有給エンジン（採用日から自動付与・2年繰越・年5日判定） ── */
function pKey(s){ const [Y,M,D]=String(s).split('-').map(Number); return new Date(Y,(M||1)-1,D||1); }
function addMonths(d,n){ const x=new Date(d); x.setMonth(x.getMonth()+n); return x; }
function addYears(d,n){ const x=new Date(d); x.setFullYear(x.getFullYear()+n); return x; }
function firstOctAfter(d){ let o=new Date(d.getFullYear(),9,1); if(o<=d) o=new Date(d.getFullYear()+1,9,1); return o; }
const YUKYU=[10,11,12,14,16,18,20];   // 勤続0.5,1.5,2.5,3.5,4.5,5.5,6.5+
function computeGrants(hireStr,asOf,override){
  if(!hireStr) return [];
  const hire=pKey(hireStr), grants=[];
  const g1=addMonths(hire,6);                       // 採用6か月後：10日
  if(g1<=asOf) grants.push({date:g1,days:YUKYU[0]});
  let od=firstOctAfter(g1), n=1;                    // 以降は毎年10月1日
  while(od<=asOf){ grants.push({date:new Date(od),days:YUKYU[Math.min(n,6)]}); n++; od=addYears(od,1); }
  grants.forEach(g=>g.expiry=addYears(g.date,2));    // 2年で時効
  if(override!=null && grants.length) grants[grants.length-1].days=override;
  return grants;
}
function usedLeave(emp){let u=0;const d=empData[emp]||{};for(const k in d){u+=(normDay(d[k]).leave||0);}return u;}
function leaveLedger(emp,asOf){
  const c=cfg[emp]||{}; if(!c.hire) return null;
  const ov=(c.granted!==undefined&&c.granted!=='' &&c.granted!==null)?Number(c.granted):null;
  const grants=computeGrants(c.hire,asOf,ov);
  const rem=grants.map(g=>({date:g.date,expiry:g.expiry,left:g.days,days:g.days}));
  const usage=[]; const d=empData[emp]||{};
  for(const k in d){ const lv=normDay(d[k]).leave; if(lv>0) usage.push({date:pKey(k),days:lv}); }
  usage.sort((a,b)=>a.date-b.date);
  let deficit=0;
  for(const u of usage){ let need=u.days;
    for(const g of rem){ if(need<=0)break; if(g.date>u.date||g.expiry<=u.date)continue; const t=Math.min(g.left,need); g.left-=t; need-=t; }
    if(need>0) deficit+=need;
  }
  let bal=0; for(const g of rem){ if(g.date<=asOf&&g.expiry>asOf) bal+=g.left; }
  return {balance:+(bal-deficit).toFixed(1), current:grants.length?grants[grants.length-1]:null};
}
function grantedOf(emp){
  if(noLeave(emp)) return 0;
  const c=cfg[emp]||{};
  if(c.hire){ const l=leaveLedger(emp,new Date()); return l&&l.current?l.current.days:0; }
  return (c.granted&&Number(c.granted))||0;
}
function remainingLeave(emp){
  if(noLeave(emp)) return 0;
  const c=cfg[emp]||{};
  if(c.hire){ const l=leaveLedger(emp,new Date()); return l?l.balance:0; }
  return +(((c.granted&&Number(c.granted))||0)-usedLeave(emp)).toFixed(1);
}
/* 年5日取得義務：全社一律で当年度(10/1〜翌9/30)に5日 */
function fiveDayStatus(emp,asOf){
  asOf=asOf||new Date();
  if(noLeave(emp)) return null;
  const c=cfg[emp]||{}; if(!c.hire) return null;
  const l=leaveLedger(emp,asOf); if(!l||!l.current||l.current.days<10) return null;
  // 当年度の起点＝直近の10/1（初回付与が年度途中の1年目は付与日を起点にする）
  const y=asOf.getMonth()>=9?asOf.getFullYear():asOf.getFullYear()-1;   // 10月以降はその年、9月までは前年
  let start=new Date(y,9,1);
  if(l.current.date>start) start=l.current.date;   // 初回付与が年度途中ならそこから
  const deadline=new Date(y+1,8,30);               // 一律 9/30
  let taken=0; const d=empData[emp]||{};
  for(const k in d){ const dt=pKey(k); if(dt>=start&&dt<=deadline) taken+=normDay(d[k]).leave; }
  const need=Math.max(0,5-taken);
  return {need,taken:+taken.toFixed(1),deadline,daysToDeadline:Math.ceil((deadline-asOf)/864e5),done:need<=0};
}
function fmtMD(d){ return `${d.getMonth()+1}/${d.getDate()}`; }
function isOfficer(emp){ return !!(cfg[emp]&&cfg[emp].officer); }
function isHelper(emp){ return !!(cfg[emp]&&cfg[emp].helper); }
function noLeave(emp){ return isOfficer(emp)||isHelper(emp); }

/* ═══ PUNCH ACTION ═══ */
async function punch(type){
  const k=today();
  if(!empData[currentEmp]) empData[currentEmp]={};
  const day=empData[currentEmp][k]=normDay(empData[currentEmp][k]||emptyDay());
  const now=Date.now(), rule=ruleFor(new Date());
  let icon,color,msg,sub='',showOt=false;

  if(type==='in'||type==='resume'||type==='holiday'){
    const isResume=(day.sessions||[]).length>0;
    day.sessions.push({in:now,out:null});
    if(type==='holiday') day.holiday=true;
    color='go'; icon=isResume?'🔄':'🟢';
    msg=isResume?`${currentEmp}さん、再出勤を記録しました`:`${currentEmp}さん、おはようございます`;
  } else if(type==='out'){
    const op=openSession(day);
    if(op){ (day.breaks||[]).forEach(b=>{if(!b.end)b.end=now;}); op.out=now; }
    const w=workedMin(day), ot=overtimeMin(day,rule);
    icon='🔴'; color='stop'; msg=`${currentEmp}さん、お疲れ様でした`; sub=`本日の実働 ${fmtDur(w)}`;
    if(ot>0){showOt=true;document.getElementById('cfOt').textContent=`残業 ${fmtDur(ot)}`;}
  } else if(type==='break'){
    const open=(day.breaks||[]).find(b=>!b.end);
    if(open){open.end=now;icon='✅';color='rest';msg='休憩終了';} else {day.breaks.push({start:now,end:null});icon='☕';color='rest';msg='休憩開始';}
  } else if(type==='leave'){
    empData[currentEmp][k]=emptyDay(); empData[currentEmp][k].leave=1;
    icon='🏖'; color='leave'; msg=`${currentEmp}さんの有給（全休）を登録しました`;
  } else if(type==='half'){
    day.leave=0.5;
    icon='🌤'; color='leave'; msg=`${currentEmp}さんの半休（0.5日）を登録しました`;
  }
  await saveData();
  document.getElementById('cfIcon').style.background={go:'var(--go-bg)',stop:'var(--stop-bg)',rest:'var(--rest-bg)',leave:'var(--leave-bg)'}[color];
  document.getElementById('cfIcon').textContent=icon;
  document.getElementById('cfMsg').textContent=msg;
  document.getElementById('cfTime').textContent=hm(Date.now());
  document.getElementById('cfSub').textContent=sub;
  document.getElementById('cfOt').style.display=showOt?'block':'none';
  showScreen('screen-confirm');
  setTimeout(()=>{renderGrid();showScreen('screen-list');currentEmp=null;},2800);
}

let REP=new Date();
const hDec=m=>+(Math.max(0,m)/60).toFixed(2);
/* 1日の内訳を給与計算区分に分解 */
function dayBuckets(day,dt){
  if(!day||day.leave===1) return {worked:0,std:0,ot:0,hol:0,night:0};
  const rule=ruleFor(dt), w=workedMin(day), nt=nightMin(day);
  if(rule.type==='off') return {worked:w,std:0,ot:0,hol:w,night:nt}; // 日・木・祝の勤務は全部休日労働
  const ot=overtimeMin(day,rule);
  return {worked:w,std:Math.max(0,w-ot),ot,hol:0,night:nt};
}
function monthAgg(emp,y,m){
  const days=new Date(y,m+1,0).getDate();
  const A={workDays:0,holDays:0,leave:0,worked:0,std:0,ot:0,hol:0,night:0,lateDays:0,lateMin:0,earlyDays:0,earlyMin:0,detail:[]};
  for(let i=1;i<=days;i++){
    const dt=new Date(y,m,i),k=dkey(dt),raw=(empData[emp]||{})[k]; if(!raw)continue;
    const day=normDay(raw), rule=ruleFor(dt);
    const typ=rule.type==='off'?'休':(rule.type==='sat'?'土':'平');
    A.leave+=(day.leave||0);
    const b=dayBuckets(day,dt), hasWork=b.worked>0;
    if(hasWork){ A.workDays++; A.worked+=b.worked; A.std+=b.std; A.ot+=b.ot; A.hol+=b.hol; A.night+=b.night; if(rule.type==='off')A.holDays++;
      const le=lateEarly(day,dt); if(le.late>0){A.lateDays++;A.lateMin+=le.late;} if(le.early>0){A.earlyDays++;A.earlyMin+=le.early;} }
    if(hasWork||day.leave){
      const fi=firstIn(day),lo=lastOut(day);
      const memo=[day.leave===1?'有給':'',day.leave===0.5?'半休':'',(rule.type==='off'&&hasWork)?'休日出勤':''].filter(Boolean).join('/');
      A.detail.push({date:`${y}/${m+1}/${i}`,wd:WD[dt.getDay()],typ,
        in:(fi&&day.leave!==1)?hm(fi):'', out:(lo&&day.leave!==1)?hm(lo):'', brk:breakMin(day),
        worked:b.worked,std:b.std,ot:b.ot,hol:b.hol,night:b.night,memo});
    }
  }
  if(isOfficer(emp)){ A.ot=A.hol=A.night=A.lateDays=A.lateMin=A.earlyDays=A.earlyMin=A.holDays=A.leave=0; A.std=A.worked; }
  return A;
}
function openReport(){ REP=new Date(); renderReport(); }

    <div class="modal-actions" style="margin-top:16px">
      <button class="cancel" id="repClose">閉じる</button>
    </div>`;
  document.getElementById('modalBg').classList.add('open');
  document.getElementById('repPrev').onclick=()=>{REP.setMonth(REP.getMonth()-1);renderReport();};
  document.getElementById('repNext').onclick=()=>{REP.setMonth(REP.getMonth()+1);renderReport();};
  document.getElementById('repClose').onclick=closeModal;
  document.getElementById('modal').querySelectorAll('.ts-btn').forEach(b=>b.onclick=()=>openTimesheet(b.dataset.emp));
  document.getElementById('repOpenTs').onclick=()=>openTimesheet(document.getElementById('repEmpSel').value);
  document.getElementById('repAllTs').onclick=openAllTimesheets;

function sheetInner(emp,y,m){
  const days=new Date(y,m+1,0).getDate();
  const A=monthAgg(emp,y,m);
  let trs='';
  for(let i=1;i<=days;i++){
    const dt=new Date(y,m,i),k=dkey(dt),raw=(empData[emp]||{})[k],day=raw?normDay(raw):null,rule=ruleFor(dt);
    const dow=dt.getDay(),hol=holidayName(dt),off=rule.type==='off';
    const dcol=(dow===0||hol)?'#c0392b':(dow===6?'#2f6fd0':'#000');
    let c={in:'',o:'',brk:'',w:'',ot:'',nt:'',h:'',memo:''};
    if(day){
      const b=dayBuckets(day,dt);
      if(day.leave===1){ c.memo='有給'; }
      else{ const fi=firstIn(day),lo=lastOut(day);
        c.in=fi?hm(fi):''; c.o=lo?hm(lo):''; c.brk=breakMin(day)||'';
        c.w=b.worked?fmtDur(b.worked):''; c.ot=b.ot?fmtDur(b.ot):''; c.nt=b.night?fmtDur(b.night):''; c.h=b.hol?fmtDur(b.hol):'';
        const le=lateEarly(day,dt);
        c.memo=[day.leave===0.5?'半休':'',(off&&b.worked>0)?'休日出勤':'',le.late>0?`遅刻${le.late}分`:'',le.early>0?`早退${le.early}分`:''].filter(Boolean).join(' '); }
    }
    trs+=`<tr${off?' style="background:#f7f2ee"':''}>
      <td style="color:${dcol}">${i}</td><td style="color:${dcol}">${WD[dow]}</td>
      <td>${c.in}</td><td>${c.o}</td><td>${c.brk}</td><td>${c.w}</td><td>${c.ot}</td><td>${c.nt}</td><td>${c.h}</td>
      <td class="memo">${c.memo}${hol?`<span class="hol">${hol}</span>`:''}</td></tr>`;
  }
  return `
    <div class="sh-head">
      <div><div style="font-size:12px;font-weight:700">株式会社リバーフィールズ</div><h3>勤務表</h3></div>
      <div style="text-align:right"><div>${y}年 ${m+1}月</div><div style="font-size:15px;font-weight:800;margin-top:2px">${emp} <span style="font-weight:400;font-size:11px">殿</span>${isOfficer(emp)?' <span style="font-size:10px;color:#b5476d;font-weight:700">（役員）</span>':''}</div></div>
    </div>
    <table class="ts">
      <thead><tr><th>日</th><th>曜</th><th>出勤</th><th>退勤</th><th>休憩(分)</th><th>実働</th><th>時間外</th><th>深夜</th><th>休日</th><th>摘要</th></tr></thead>
      <tbody>${trs}</tbody>
    </table>
    <div class="sh-sum">
      <div>出勤日数<b>${A.workDays}日</b></div>
      <div>総労働<b>${fmtDur(A.worked)}</b></div>
      <div>所定内<b>${fmtDur(A.std)}</b></div>
      <div>時間外<b>${fmtDur(A.ot)}</b></div>
      <div>深夜<b>${fmtDur(A.night)}</b></div>
      <div>休日労働<b>${fmtDur(A.hol)}</b>（${A.holDays}日）</div>
      <div>遅刻<b>${A.lateDays}回</b>（${fmtDur(A.lateMin)}）</div>
      <div>早退<b>${A.earlyDays}回</b>（${fmtDur(A.earlyMin)}）</div>
      <div>有給取得<b>${A.leave}日</b></div>
      <div>有給残<b>${remainingLeave(emp)}日</b></div>
      ${(()=>{const f=fiveDayStatus(emp);return f?`<div>年5日<b>${f.done?'達成':'あと'+f.need+'日'}</b>（期限${fmtMD(f.deadline)}）</div>`:'';})()}
    </div>`;
}

function uiPrompt(msg,numeric){

/* ═══ 暗証番号 ═══ */
let unlockUntil=0;
async function requirePin(){
  if(Date.now()<unlockUntil) return true;   // 一度入力すれば2分間は再入力不要
  if(!PIN){
    const p1=await uiPrompt('管理用の暗証番号（4桁など）を新しく設定してください',true); if(!p1)return false;
    const p2=await uiPrompt('確認のためもう一度入力してください',true); if(!p2)return false;
    if(p1!==p2){await uiAlert('暗証番号が一致しませんでした。もう一度お試しください。');return false;}
    PIN=p1; await S.set('kiosk:pin',p1); unlockUntil=Date.now()+120000; await uiAlert('暗証番号を設定しました。');return true;
  }
  const entry=await uiPrompt('暗証番号を入力してください',true); if(entry===null)return false;
  if(entry!==PIN){await uiAlert('暗証番号が違います。');return false;}
  unlockUntil=Date.now()+120000; return true;
}
async function changePin(back){
  back=back||openSettings;
  const p1=await uiPrompt('新しい暗証番号を入力してください',true); if(!p1){back();return;}
  const p2=await uiPrompt('確認のためもう一度入力してください',true);
  if(p1!==p2){await uiAlert('一致しませんでした。');back();return;}
  PIN=p1; await S.set('kiosk:pin',p1); unlockUntil=Date.now()+120000; await uiAlert('暗証番号を変更しました。'); back();
}

function exportBackup(){
  const data={version:1, savedAt:new Date().toISOString(), employees, archived, empData, cfg};
  const blob=new Blob([JSON.stringify(data)],{type:'application/json'});
  const a=document.createElement('a'); a.href=URL.createObjectURL(blob);
  const d=new Date(); a.download=`勤怠バックアップ_${d.getFullYear()}${pad(d.getMonth()+1)}${pad(d.getDate())}.json`; a.click();
  lastBackupTs=new Date().toISOString(); S.set('kiosk:lastBackup', lastBackupTs); renderGrid();

async function importBackup(e){
  const file=e.target.files&&e.target.files[0]; if(!file) return;
  try{
    const text=await file.text(); const d=JSON.parse(text);
    if(!d||!Array.isArray(d.employees)||typeof d.empData!=='object') throw 0;
    if(!(await uiConfirm('現在のデータをこのバックアップで<b>上書き</b>します。よろしいですか？<br>（今のデータは失われます）'))){ e.target.value=''; return; }
    employees=d.employees||[]; archived=d.archived||[]; empData=d.empData||{}; cfg=d.cfg||{};
    for(const emp in empData){ for(const k in empData[emp]){ empData[emp][k]=normDay(empData[emp][k]); } }
    await saveEmps(); await saveArchived(); await saveData(); await saveCfg();
    renderGrid(); await uiAlert(`復元しました（保存日時：${d.savedAt?new Date(d.savedAt).toLocaleString('ja-JP'):'不明'}）。`);
    openSettings();
  }catch(err){ await uiAlert('このファイルは読み込めませんでした。正しいバックアップファイルか確認してください。'); }
  e.target.value='';
}
function openHistory(){
  const emps=employees.concat(archived);
  const sel=emps[0]||'';
  renderHistory(sel);
}
function renderHistory(emp){
  const emps=employees.concat(archived);
  const now=new Date();
  const grants=(cfg[emp]&&cfg[emp].hire)?computeGrants(cfg[emp].hire,addYears(now,1)):[];  // 来年ぶんまで（次回付与予定を含む）
  const l=(cfg[emp]&&cfg[emp].hire)?leaveLedger(emp,now):null;
  // 付与行
  let grantRows='';
  for(const g of grants){
    const future=g.date>now;
    grantRows+=`<tr style="${future?'color:var(--ink-soft)':''}"><td>${g.date.getFullYear()}/${g.date.getMonth()+1}/${g.date.getDate()}</td><td>${g.days}日</td><td>${g.expiry.getFullYear()}/${g.expiry.getMonth()+1}/${g.expiry.getDate()}</td><td>${future?'付与予定':'付与済'}</td></tr>`;
  }
  // 取得行
  const taken=[]; const d=empData[emp]||{};
  for(const k in d){ const lv=normDay(d[k]).leave; if(lv>0) taken.push({date:k,lv}); }
  taken.sort((a,b)=>a.date<b.date?-1:1);
  const takenRows=taken.map(t=>`<tr><td>${t.date.replace(/-/g,'/')}</td><td>${t.lv===1?'全休':'半休(0.5)'}</td></tr>`).join('')||'<tr><td colspan="2" style="color:var(--ink-soft)">なし</td></tr>';

  md.innerHTML=`

      <h2>有給 付与・取得履歴</h2>
      <select id="hisSel" style="border:1.5px solid var(--line);border-radius:8px;padding:8px 10px;font-size:.95rem">${emps.map(e=>`<option value="${e}" ${e===emp?'selected':''}>${e}${archived.includes(e)?'（退職）':''}</option>`).join('')}</select>
    </div>
    ${cfg[emp]&&cfg[emp].hire?`<p>採用日：${cfg[emp].hire.replace(/-/g,'/')}　／　現在の残：<b style="color:var(--leave)">${l?l.balance:0}日</b></p>`:'<p style="color:var(--stop)">採用日が未登録です。従業員管理で採用日を入れると付与予定が計算されます。</p>'}
    <div style="display:flex;gap:14px;flex-wrap:wrap">
      <div style="flex:1;min-width:240px">
        <div style="font-size:.8rem;font-weight:800;color:var(--ink-soft);margin-bottom:4px">付与（予定含む）</div>
        <table class="report-table"><thead><tr><th>付与日</th><th>日数</th><th>時効</th><th>状態</th></tr></thead><tbody>${grantRows||'<tr><td colspan="4" style="color:var(--ink-soft)">—</td></tr>'}</tbody></table>
      </div>
      <div style="flex:1;min-width:180px">
        <div style="font-size:.8rem;font-weight:800;color:var(--ink-soft);margin-bottom:4px">取得日</div>
        <table class="report-table"><thead><tr><th>日付</th><th>区分</th></tr></thead><tbody>${takenRows}</tbody></table>
      </div>
    </div>
    <div class="modal-actions" style="margin-top:16px"><button class="cancel" id="hisBack" style="flex:0 0 auto">← 設定へ</button><button class="cancel" id="hisClose">閉じる</button></div>`;
  document.getElementById('modalBg').classList.add('open');
  document.getElementById('hisSel').onchange=e=>renderHistory(e.target.value);

function loadEditorDay(emp,dateStr){
  const raw=(empData[emp]||{})[dateStr]; const day=raw?normDay(raw):emptyDay();

    sessions:(day.sessions||[]).map(s=>({in:s.in?hm(s.in):'',out:s.out?hm(s.out):''})),

function syncEditor(){

        <select id="edLeave" style="${EDI}">
          <option value="0" ${ED.leave===0?'selected':''}>なし</option>

        </select></label>

  $('edDate').onchange=e=>loadEditorDay(ED.emp,e.target.value);
  $('edLeave').onchange=()=>{syncEditor();renderEditor();};
  $('edAddSess').onclick=()=>{syncEditor();ED.sessions.push({in:'',out:''});renderEditor();};
  document.getElementById('modal').querySelectorAll('button[data-del]').forEach(b=>b.onclick=()=>{syncEditor();ED.sessions.splice(+b.dataset.del,1);renderEditor();});

  $('edSave').onclick=saveEditorDay;
  $('edDelete').onclick=deleteEditorDay;
}
async function saveEditorDay(){
  syncEditor();
  const {emp,date}=ED;
  if(!empData[emp]) empData[emp]={};
  const [Y,M,D]=date.split('-').map(Number);
  const mk=t=>{ if(!t)return null; const [h,mi]=t.split(':').map(Number); return new Date(Y,M-1,D,h,mi,0,0).getTime(); };
  if(ED.leave===1){
    const nd=emptyDay(); nd.leave=1; empData[emp][date]=nd;
  } else {
    const sessions=[];
    for(const s of ED.sessions){
      const inT=mk(s.in), outT=s.out?mk(s.out):null;
      if(inT===null&&outT===null) continue;
      let o=outT; if(o!==null&&inT!==null&&o<inT) o+=864e5;
      sessions.push({in:inT,out:o});
    }
    const breaks=[];
    if(ED.brk>0&&sessions.length){ const fi=Math.min(...sessions.filter(s=>s.in).map(s=>s.in)); breaks.push({start:fi,end:fi+ED.brk*60000}); }
    if(!sessions.length&&!ED.leave&&!ED.holiday){ delete empData[emp][date]; }
    else empData[emp][date]={sessions,breaks,leave:ED.leave||0,holiday:ED.holiday};
  }
  await saveData(); renderGrid();
  await uiAlert(`${emp}さんの ${M}月${D}日 を保存しました。`);
  loadEditorDay(emp,date);
}
async function deleteEditorDay(){
  if(!(await uiConfirm(`${ED.emp}さんの ${ED.date} の記録を削除しますか？`))) { renderEditor(); return; }
  if(empData[ED.emp]) delete empData[ED.emp][ED.date];
  await saveData(); renderGrid(); loadEditorDay(ED.emp,ED.date);
}

let CAL=new Date();
let showHelpers=false;
function calChip(name,label,type){ return `<span class="cal-chip ${type}"><span>${name}</span><b>${label}</b></span>`; }
function openCalendar(){ CAL=new Date(); renderCalendar(); }
function renderCalendar(){
  const y=CAL.getFullYear(), m=CAL.getMonth();
  const startDow=new Date(y,m,1).getDay(), days=new Date(y,m+1,0).getDate();
  const heads=['日','月','火','水','木','金','土'].map((w,i)=>`<div class="cal-head" style="color:${i===0?'var(--sun)':i===6?'var(--sat)':'var(--ink-soft)'}">${w}</div>`).join('');
  let cells='';
  for(let i=0;i<startDow;i++) cells+=`<div class="cal-cell empty"></div>`;
  for(let d=1;d<=days;d++){
    const dt=new Date(y,m,d), key=dkey(dt), dow=dt.getDay(), hol=holidayName(dt);
    const off=dow===0||dow===4||hol;
    const dcol=(dow===0||hol)?'var(--sun)':(dow===6?'var(--sat)':'var(--ink)');
    let chips='';
    for(const emp of employees){
      const raw=(empData[emp]||{})[key]; if(!raw)continue; const day=normDay(raw);
      if(day.leave===1) chips+=calChip(emp,'有','leave');
      else if(day.leave===0.5) chips+=calChip(emp,'半','half');
      else if(day.holiday&&(day.sessions||[]).length) chips+=calChip(emp,'出','holiday');
    }
    cells+=`<div class="cal-cell ${off?'off':''} ${key===today()?'today':''}">
      <div class="cal-d" style="color:${dcol}">${d}</div>
      ${hol?`<div class="cal-hol">${hol}</div>`:''}
      <div class="cal-chips">${chips}</div></div>`;
  }
  const lg='padding:2px 8px;border-radius:6px;font-weight:700;font-size:.72rem';
  const md=document.getElementById('modal'); md.style.maxWidth='min(94vw,760px)';
  md.innerHTML=`
    <div style="display:flex;justify-content:space-between;align-items:center;margin-bottom:8px">
      <h2>休暇カレンダー</h2>
      <div style="display:flex;align-items:center;gap:6px">
        <button id="calPrev" style="border:1.5px solid var(--line);background:#fff;border-radius:8px;width:34px;height:34px;font-size:1.1rem;cursor:pointer">‹</button>
        <span style="min-width:120px;text-align:center;font-weight:800;font-variant-numeric:tabular-nums">${y}年${m+1}月</span>
        <button id="calNext" style="border:1.5px solid var(--line);background:#fff;border-radius:8px;width:34px;height:34px;font-size:1.1rem;cursor:pointer">›</button>
      </div>
    </div>
    <div style="display:flex;gap:10px;margin-bottom:12px;flex-wrap:wrap;align-items:center">
      <span style="${lg};background:var(--leave-bg);color:var(--leave)">有＝有給</span>
      <span style="${lg};background:#eef3fb;color:#2f6fd0">半＝半休</span>
      <span style="${lg};background:var(--holiday-bg);color:var(--holiday)">出＝休日出勤</span>
      <span style="display:inline-flex;align-items:center;gap:5px;font-size:.72rem;color:var(--ink-soft)"><span style="width:13px;height:13px;background:#faf5f2;border:1px solid var(--line);border-radius:3px;display:inline-block"></span>会社休日（日・木・祝）</span>
    </div>
    <div class="cal-grid" style="margin-bottom:4px">${heads}</div>
    <div class="cal-grid">${cells}</div>
    <div class="modal-actions" style="margin-top:16px"><button class="ok" id="calClose">閉じる</button></div>`;
  document.getElementById('modalBg').classList.add('open');
  document.getElementById('calPrev').onclick=()=>{CAL.setMonth(CAL.getMonth()-1);renderCalendar();};
  document.getElementById('calNext').onclick=()=>{CAL.setMonth(CAL.getMonth()+1);renderCalendar();};
  document.getElementById('calClose').onclick=closeModal;
}

/* ═══ WIRE + BOOT ═══ */
document.getElementById('backBtn').onclick=()=>{renderGrid();showScreen('screen-list');};
document.getElementById('btnCal').onclick=openCalendar;
document.getElementById('btnEdit').onclick=async()=>{ if(await requirePin()) openEditor(); };
document.getElementById('btnManage').onclick=async()=>{ if(await requirePin()) openManage(); };
document.getElementById('btnReport').onclick=async()=>{ if(await requirePin()) openReport(); };
document.getElementById('btnSettings').onclick=async()=>{ if(await requirePin()) openSettings(); };
document.getElementById('modalBg').onclick=e=>{if(e.target.id==='modalBg')closeModal();};
buildStars(); tick(); setInterval(tick,1000);
setInterval(()=>{if(document.getElementById('screen-list').style.display!=='none')renderGrid();},60000);
(async()=>{await load();renderGrid();})();
</script>
</body>
